<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <title>Offline — LifeOS</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #f9fafb;
            color: #111827;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #030712; color: #f3f4f6; }
            .card { background: #111827 !important; border-color: #1f2937 !important; }
            .muted { color: #9ca3af !important; }
        }
        .card {
            max-width: 22rem;
            width: 100%;
            text-align: center;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
            padding: 2rem 1.5rem;
            box-shadow: 0 10px 30px -12px rgba(0,0,0,.12);
        }
        .logo {
            width: 3rem; height: 3rem;
            margin: 0 auto 1rem;
            border-radius: .75rem;
            background: #6366f1;
            color: #fff;
            font-weight: 700;
            font-size: 1.25rem;
            display: flex; align-items: center; justify-content: center;
        }
        h1 { font-size: 1.125rem; margin: 0 0 .5rem; }
        p.muted { font-size: .875rem; color: #6b7280; margin: 0 0 1.5rem; line-height: 1.5; }
        button {
            font: inherit; font-weight: 600; font-size: .875rem;
            color: #fff; background: #4f46e5;
            border: 0; border-radius: .625rem;
            padding: .65rem 1.25rem; cursor: pointer;
        }
        button:active { background: #4338ca; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">L</div>
        <h1>You're offline</h1>
        <p class="muted">LifeOS needs a connection to load this page. Check your network and try again — your data is safe.</p>
        <button onclick="location.reload()">Retry</button>
    </div>
</body>
</html>
